    <title>PhoneHerb BETA</title>

        body{
            text-align: center;
            margin: 0;
            background-size: 70%;
        }
        h2{
            color: rgb(156, 196, 106);
        }
        #lv{
            color: white;
            border: solid;
            border-color: rgb(156, 196, 106);
            background-color: rgb(156, 196, 106);
            position: fixed;
            top: 0;
            left: 0;
        }
        #wc{position: fixed;
            top: 20%;
            right: 0;
            z-index: 100;
        }
        #herb{
            position: absolute;
            padding: 0;

            left: 50%;
            transform: translate(-50%,10%);

            z-index: 1;
        }
        #water{

        img {

        function down(){
            setTimeout(function() {
                if (parseFloat(document.getElementById('hosehand').style.top.replace(/[^0-9.]/g, ""))<90 && holding == false){

            }, 1)

        down();
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 100;
            mouseY = (e.clientY / window.innerHeight) * 100;
            if (holding){
                document.getElementById('hosehand').style.top = mouseY -2 +"%";
                document.getElementById('hosehand').style.left = mouseX -135 +"%";
            }
        });
        window.addEventListener('mouseup', (e) => {
            holding = false;
        })
        function sell(){
            money += levl*2;
            exp = 0;
            levl = 0;
            document.getElementById('lv').style.width = exp / 30 * 100 + "%";
            document.getElementById('lv').innerHTML = "Lv." + levl;
            document.getElementById('herbimg').style.width = (30 + (levl * 0.2 * 30)) + "%";
            document.getElementById('cash').innerText = money;
            localStorage.setItem('herbexp', exp);
            localStorage.setItem('herblv', levl);
            localStorage.setItem('herbmn', money);
        }
        function upgrade(){
            if (money >= 30 * multiple){
                money -= 30 * multiple;
                multiple++;
                document.getElementById('wtrup').innerText = "물 업그레이드💦 $" + 30 * multiple;
                document.getElementById('cash').innerText = money;
                localStorage.setItem('herbmp', multiple);
                localStorage.setItem('herbmn', money);
            }else{
                document.getElementById('wtrup').innerText = "돈이 부족합니다"
                setTimeout(function() {
                    document.getElementById('wtrup').innerText = "물 업그레이드💦 $" + 30 * multiple;
                },1000)
            }
        }
        function fallhund(num){
            function loop(){
                setTimeout(function() {
                    //console.log(parseFloat(document.getElementById('water' + num).style.top.replace(/[^0-9.]/g, "")));
                    document.getElementById('water' + num).style.top = 0.2 + parseFloat(document.getElementById('water' + num).style.top.replace(/[^0-9.]/g, "")) + "%";
                    document.getElementById('water' + num).style.right = 0.11 + parseFloat(document.getElementById('water' + num).style.right.replace(/[^0-9.]/g, "")) + "%";
                    if(parseFloat(document.getElementById('water' + num).style.top.replace(/[^0-9.]/g, "")) < 98){
                        loop();
                    }else{
                        document.getElementById('water' + num).remove();
                        exp += 10;
                        document.getElementById('lv').style.width = exp / 30 * 100 + "%";
                        if(exp >= 30){
                            levl++;
                            exp = 0;
                            document.getElementById('amt').innerText = levl*2;
                            document.getElementById('lv').style.width = exp / 30 * 100 + "%";
                            document.getElementById('lv').innerHTML = "Lv." + levl;
                            document.getElementById('herbimg').style.width = (30 + (levl * 0.2 * 30)) + "%";
                        }
                        localStorage.setItem('herbexp', exp);
                        localStorage.setItem('herblv', levl);
                    }
                },1)
            }
            loop();
        }

        function shinin(){
                setTimeout(function() {
                    exp++;
                    document.getElementById('lv').style.width = exp / 30 * 100 + "%";
                    if(exp >= 30){
                        levl++;
                        exp = 0;
                        document.getElementById('amt').innerText = levl*2;
                        document.getElementById('lv').style.width = exp / 30 * 100 + "%";
                        document.getElementById('lv').innerHTML = "Lv." + levl;
                        document.getElementById('herbimg').style.width = (30 + (levl * 0.2 * 30)) + "%";
                    }
                    localStorage.setItem('herbexp', exp);
                    localStorage.setItem('herblv', levl);
                    shinin();
                },10000)
        }
        function wata(){
            for(i=0;i<Math.floor(multiple/100);i++){
                document.getElementById('waters').innerHTML += '<div style="font-size:x-large;position: fixed;width: 0px;right: 19%;top: 46%;" id="water'+ waternum +'">🩸</div>';
                document.getElementById('water' + waternum).style.top = 48.5 - i*1.5 + '%';
                document.getElementById('water' + waternum).style.right = 20.5 - i*1.5 + '%';
                fallhund(waternum);
                waternum++;
            }
            for(i=0;i<Math.floor((multiple%100)/50);i++){
                document.getElementById('waters').innerHTML += '<div style="position: fixed;width: 0px;right: 19%;top: 46%;" id="water'+ waternum +'">🩸</div>';
                document.getElementById('water' + waternum).style.top = 48.5 - i*1.5 + '%';
                document.getElementById('water' + waternum).style.right = 20.5 - i*1.5 + '%';
                fallhund(waternum);
                waternum++;
            }
            for(i=0;i<Math.floor(((multiple%100)%50)/20);i++){
                document.getElementById('waters').innerHTML += '<div style="font-size:xx-large;position: fixed;width: 0px;right: 19%;top: 46%;" id="water'+ waternum +'">💧</div>';
                document.getElementById('water' + waternum).style.top = 47.5 - i*1.5 + '%';
                document.getElementById('water' + waternum).style.right = 20.5 - i*1.5 + '%';
                falltw(waternum);
                waternum++;
            }
            for(i=0;i<Math.floor((((multiple%100)%50)%20)/10);i++){
                document.getElementById('waters').innerHTML += '<div style="font-size:x-large;position: fixed;width: 0px;right: 19%;top: 46%;" id="water'+ waternum +'">💧</div>';
                document.getElementById('water' + waternum).style.top = 47.5 - i*1.5 + '%';
                document.getElementById('water' + waternum).style.right = 20.5 - i*1.5 + '%';
                fallten(waternum);
                waternum++;
            }
            for(i=0;i<(((multiple%100)%50)%20)%10;i++){
                document.getElementById('waters').innerHTML += '<div style="position: fixed;width: 0px;right: 19%;top: 46%;" id="water'+ waternum +'">💧</div>';
                document.getElementById('water' + waternum).style.top = 47.5 - i*1.5 + '%';
                document.getElementById('water' + waternum).style.right = 20.5 - i*1.5 + '%';
                fall(waternum);
                waternum++;
            }
        }

            holding = true;

        document.addEventListener("DOMContentLoaded",function(){
            exp = Number(localStorage.getItem('herbexp'));
            levl = Number(localStorage.getItem('herblv'));
            money = Number(localStorage.getItem('herbmn'));
            multiple = Number(localStorage.getItem('herbmp'));
            if (multiple == false){
                multiple = 1;
            }
            document.getElementById('wtrup').innerText = "물 업그레이드💦 $" + 30 * multiple;
            document.getElementById('lv').style.width = exp / 30 * 100 + "%";
            document.getElementById('lv').innerHTML = "Lv." + levl;
            document.getElementById('herbimg').style.width = (30 + (levl * 0.2 * 30)) + "%";
            document.getElementById('cash').innerText = money;
            document.getElementById('amt').innerText = levl*2;
            async function getSunlight() {
                const url = "https://api.open-meteo.com/v1/forecast?latitude=37.5665&longitude=126.9780&current=shortwave_radiation";
                
                const response = await fetch(url);
                const data = await response.json();
                
                // 현재 일조량 (단위: W/m²)
                console.log(data.current.shortwave_radiation);
                document.getElementById('sunvalue').innerText = data.current.shortwave_radiation;
                weath = data.current.shortwave_radiation;
                if (weath > 600){
                    shinin();
                }else{
                    if(weath > 200){
                        document.getElementById('sunshine').className = 'fa-regular fa-sun';
                    }else{
                        if(weath == 0){
                            document.getElementById('sunshine').className = 'fa-solid fa-moon';
                        }else{
                            document.getElementById('sunshine').className = 'fa-solid fa-cloud';
                        }
                    }
                }
            }
            getSunlight();
        })

<body>
    <div style="width: 0;" id="lv">Lv.0</div>
    <h2>Phone Herb</h2>
    <h4>폰에서 허브 키우기</h4>
    <div style="position: fixed;z-index: 100;left: 50%;transform: translate(-50%,10%);">
        <i class="fa-solid fa-shop" onclick="if(document.getElementById('shop').style.display == 'none'){document.getElementById('shop').style.display = 'block'}else{document.getElementById('shop').style.display = 'none'}"></i>
        <i class="fa-solid fa-sun" id="sunshine" onmouseenter="document.getElementById('weather').style.display='block'" onmouseleave="document.getElementById('weather').style.display='none'"></i>
    </div><br><br>
    <span id="weather" style="position: fixed;left: 50%;transform: translate(-50%,10%);z-index: 100;border: solid;padding: 1% 0 1% 0;display: none;background-color: white;">
        <span>현재 일조량은 <span id="sunvalue">0</span>W/m² 입니다</span>
        <br><span>일조량이 높을 시 10초에 경험치가 1씩 증가합니다.</span>
    </span><br>
    <div id="shop" style="position: fixed;left: 50%;transform: translate(-50%,10%);z-index: 100;border: solid;width: 200px;;display: none;background-color: white;">
        <h4 style="margin-bottom: 6%;">상점</h4>
        <h4 style="display: none;margin-bottom: 6%;"><span style="margin: 1%;">SELL</span><span style="margin: 1%;">BUY</span></h4>
        <span onclick="sell();" style="border: solid;padding: 1%;margin: 1%;">허브 팔기🌿 $<span id="amt">0</span></span><br><br><span id="wtrup" onclick="upgrade();" style="border: solid;padding: 1%;margin: 1%;">물 업그레이드💦</span>
        <div style="margin-top: 10%;">돈 - $<span id="cash">0</span></div>
    </div>
    <img src="gomugomu.png" id="hosehand" style="z-index: 100;position: fixed;top: 0;left: -130%;" onmousedown="hold();" height="70px" alt="">
    <img id="hosetail" width="10%" style="position: fixed;top:98%;left:0;" src="tailofhose.png" height="3.5px" alt="">
    <div id="waters"></div>
    <img id="wc" onclick="wata();" src="can.png" width="21%" alt="">
    <div id="herb"><img id="herbimg" src="sprout.png" width="30%" alt=""></div>
</body>
